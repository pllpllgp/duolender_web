spring.application.name=duolender_back
jwt.secret=your-secret-key-must-be-at-least-32-characters-long

# Server
#server.port=10000

# Local
server.port=8081

# PostgreSQL
# Server
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://ep-late-flower-atl94swz-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=${DB_ID}
spring.datasource.password=${DB_PASSWORD}

# Local
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.url=jdbc:postgresql://localhost:5432/duolender
#spring.datasource.username=postgres
#spring.datasource.password=13579

# JPA Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=30000